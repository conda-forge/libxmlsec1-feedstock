context:
  name: libxmlsec1
  version: "1.3.11"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/lsh123/xmlsec/releases/download/${{ version }}/xmlsec1-${{ version }}.tar.gz
  sha256: 53675e98fa83b48201d24f7bfbcaeaa1b51496b8b19ff969785856bdeb196af3

build:
  number: 0
  skip: win

requirements:
  run_exports:
    # compatibility is not tracked at abi-laboratory, assume same as libxml2-devel
    - ${{ pin_subpackage('libxmlsec1', upper_bound='x.x') }}
  build:
    - if: unix
      then:
        - gnuconfig
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - make
  host:
    - icu
    - libgcrypt
    - libgpg-error
    - libiconv
    - libxml2-devel
    - libxslt
    - openssl
    - liblzma-devel
    - zlib
    - libltdl
  run:
    - ${{ pin_compatible('libltdl') }}
    - ${{ pin_compatible('zlib') }}

tests:
  - script: xmlsec1 --help

about:
  homepage: https://aleksey.com/xmlsec
  license: MIT AND MPL-1.1
  license_file: Copyright
  summary: XML Security Library
  repository: https://github.com/lsh123/xmlsec

extra:
  recipe-maintainers:
    - xhochy
    - jaimergp
